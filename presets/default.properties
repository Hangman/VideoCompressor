# Default Preset for Webinar Videos
# Optimized for: Static slide presentations + webcam motion video

# Name and description
preset.name=Webinar Standard
preset.description=Optimized for webinar videos with slide presentations and presenter webcam

# Video encoding
preset.codec=libx264
preset.crf=22
preset.keepSourceResolution=false
preset.resolutionWidth=1920
preset.resolutionHeight=1080
preset.fps=30
preset.ffmpegPreset=veryslow
preset.tune=animation

# Audio encoding
preset.audioBitrate=192
preset.audioCodec=aac

# Output format
preset.fastStart=true
preset.audioNormalize=false

# File size limit (in MB, 0 = unlimited)
preset.maxFileSize=0
