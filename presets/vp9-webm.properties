# VP9 WebM Preset for Web Streaming
# Optimized for: Modern web delivery with VP9 codec in WebM container

# Name and description
preset.name=VP9 WebM
preset.description=VP9-kodiertes WebM, optimiert für Web-Streaming und moderne Browser

# Video encoding
preset.videoCodec=libvpx-vp9
preset.crf=31
preset.keepSourceResolution=true
preset.resolutionWidth=1920
preset.resolutionHeight=1080
preset.fps=30
preset.ffmpegPreset=medium
preset.tune=none

# Audio encoding
preset.keepSourceAudio=true
preset.audioCodec=aac
preset.audioBitrate=192
preset.audioNormalize=false
preset.mixToMono=false

# Output format
preset.container=webm
preset.fastStart=true

# File size limit (in MB, 0 = unlimited)
preset.maxFileSize=0
