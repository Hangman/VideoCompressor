# Social Media Preset
# Optimized for: Instagram, TikTok, YouTube Shorts

# Name and description
preset.name=preset.social-media.name
preset.description=preset.social-media.description
preset.isNameI18nKey=true
preset.isDescriptionI18nKey=true

# Video encoding
preset.videoCodec=libx264
preset.crf=20
preset.resolutionWidth=1080
preset.resolutionHeight=1920
preset.fps=30
preset.ffmpegPreset=slow
preset.tune=fastdecode

# Audio encoding
preset.keepSourceAudio=false
preset.audioCodec=aac
preset.audioBitrate=128
preset.audioNormalize=true
preset.mixToMono=true

# Output format
preset.container=mp4
preset.fastStart=true
