# AV1 Preset - Next-Gen Compression
# Optimized for: Maximum compression efficiency with AV1 codec

# Name and description
preset.name=AV1 High Efficiency
preset.description=Modernes AV1-Encoding für maximale Komprimierung bei ausgezeichneter Qualität

# Video encoding
preset.videoCodec=libsvtav1
preset.crf=32
preset.keepSourceResolution=true
preset.resolutionWidth=1920
preset.resolutionHeight=1080
preset.fps=30
preset.ffmpegPreset=veryslow
preset.tune=film

# Audio encoding
preset.keepSourceAudio=true
preset.audioCodec=aac
preset.audioBitrate=192
preset.audioNormalize=false
preset.mixToMono=false

# Output format
preset.container=matroska
preset.fastStart=true

# File size limit (in MB, 0 = unlimited)
preset.maxFileSize=0
