# YouTube 4K Preset
# Optimized for: Ultra High Definition content for YouTube platform

# Name and description
preset.name=YouTube 4K Ultra HD
preset.description=Hochwertiges 4K-Preset, optimiert für YouTube-Uploads mit maximaler visueller Qualität

# Video encoding
preset.codec=libx265
preset.crf=18
preset.keepSourceResolution=false
preset.resolutionWidth=3840
preset.resolutionHeight=2160
preset.fps=60
preset.ffmpegPreset=slow
preset.tune=film

# Audio encoding
preset.keepSourceAudio=false
preset.audioBitrate=192
preset.audioCodec=aac
preset.audioNormalize=true
preset.mixToMono=false

# Output format
preset.fastStart=true

# File size limit (in MB, 0 = unlimited)
preset.maxFileSize=0
